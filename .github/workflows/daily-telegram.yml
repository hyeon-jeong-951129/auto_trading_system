# Secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID (Repository → Settings → Secrets → Actions)
# 수동 테스트: Actions 탭 → 이 워크플로 → Run workflow

name: Telegram daily screener

on:
  schedule:
    # 월~금 장 시작 전 아침(한국 08:00 KST ≈ 전날 UTC 23:00, 일~목 트리거 → 월~금 실행)
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Check Telegram secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "::error::Settings → Secrets → Actions 에 TELEGRAM_BOT_TOKEN 이 없습니다."
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "::error::Settings → Secrets → Actions 에 TELEGRAM_CHAT_ID 가 없습니다."
            exit 1
          fi

      - name: Run screener → Telegram
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 보수 텔레그램 컷 + 아침 발송(전일 장 마감 데이터 기준)
        run: |
          PYTHONPATH=. python -u main.py \
            --telegram \
            --accumulation \
            --universe 70 \
            --flow-days 5 \
            --top 12 \
            --max-rise 14 \
            --min-score-ratio 0.45 \
            --workers 6 \
            --no-news
